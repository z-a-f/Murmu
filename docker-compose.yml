services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: nonomessage
      POSTGRES_PASSWORD: nonomessage
      POSTGRES_DB: nonomessage
    ports:
      - "5432:5432"
    volumes:
      - nonomessage-postgres:/var/lib/postgresql/data

volumes:
  nonomessage-postgres:

